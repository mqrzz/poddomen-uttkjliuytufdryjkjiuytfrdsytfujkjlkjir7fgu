<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Страница не найдена — Antviz</title>
  <meta name="description" content="Страница не найдена." />
  <link rel="canonical" href="https://antviz.ru/404" />
  <link rel="icon" href="img/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1ede7b;
      --green-h: #1ac16b;
      --green-d: #149955;
      --green-light: #d2f8e5;
      --green-lighter: #e8fcf2;
      --bg: #fff;
      --bg2: #f2f4f7;
      --bg3: #f9fafc;
      --text: #191b1e;
      --muted: #707a8a;
      --border: #dfe3e8;
      --border2: #cbcdd6;
      --dark: #191b1e;
      --dark2: #2b2f33;
      --sh1: 0 4px 16px rgba(0,51,153,.04), 0 2px 2px rgba(0,51,153,.08);
      --sh2: 0 8px 20px rgba(0,51,153,.08), 0 4px 8px rgba(0,51,153,.08);
      --font: 'Geologica', 'Inter', 'Arial', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      line-height: 1.5;
      letter-spacing: -0.02em;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HERO ── */
    .hero-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }
    @media (max-width: 768px) {
      .hero-section { padding: 100px 16px 60px; }
    }

    .hero-bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,222,123,.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    /* ── Переключатель языков ── */
    .lang-switcher {
      position: fixed;
      top: 100px;
      right: 24px;
      z-index: 1000;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 6px;
      box-shadow: var(--sh2);
      display: flex;
      gap: 4px;
      font-family: var(--font);
    }
    @media (max-width: 768px) {
      .lang-switcher {
        top: 80px;
        right: 16px;
        padding: 4px;
        gap: 2px;
      }
      .lang-btn {
        font-size: 0.65rem !important;
        padding: 4px 10px !important;
      }
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .lang-btn:hover {
      color: var(--text);
      background: var(--bg2);
    }
    .lang-btn.active {
      background: var(--dark);
      color: #fff;
    }

    /* ── Код ошибки 404 ── */
    .error-code {
      font-size: clamp(80px, 22vw, 180px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.06em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .error-code .digit {
      display: inline-block;
      animation: float-digit 3s ease-in-out infinite;
    }
    .error-code .digit:nth-child(1) { animation-delay: 0s; color: var(--green); }
    .error-code .digit:nth-child(2) { animation-delay: 0.15s; color: var(--text); }
    .error-code .digit:nth-child(3) { animation-delay: 0.3s; color: var(--green); }

    @keyframes float-digit {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* ── Заголовок ── */
    .error-title {
      font-size: clamp(26px, 5vw, 44px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .error-title em {
      font-style: normal;
      color: var(--green);
    }

    .error-desc {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Анимация появления ── */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-1 { transition-delay: 0.05s; }
    .reveal-2 { transition-delay: 0.15s; }
    .reveal-3 { transition-delay: 0.25s; }
    .reveal-4 { transition-delay: 0.35s; }

    /* ── Декоративные элементы ── */
    .deco-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--border);
      pointer-events: none;
      opacity: 0.4;
    }
    .deco-ring-1 {
      width: 400px;
      height: 400px;
      top: 10%;
      right: -100px;
      animation: spin-slow 30s linear infinite;
    }
    .deco-ring-2 {
      width: 280px;
      height: 280px;
      bottom: 5%;
      left: -60px;
      animation: spin-slow 40s linear infinite reverse;
    }
    .deco-ring-3 {
      width: 160px;
      height: 160px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(30,222,123,.15);
      animation: spin-slow 20s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ── Частицы ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: particle-float linear infinite;
      z-index: 0;
    }
    @keyframes particle-float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% { opacity: 0.6; }
      90% { opacity: 0.2; }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .deco-ring-1 { width: 200px; height: 200px; right: -40px; }
      .deco-ring-2 { width: 150px; height: 150px; left: -30px; }
      .deco-ring-3 { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>

<script src="nav.js" data-page="404"></script>

<!-- Переключатель языков -->
<div class="lang-switcher" id="langSwitcher">
  <button class="lang-btn" data-lang="en">EN</button>
  <button class="lang-btn" data-lang="de">DE</button>
  <button class="lang-btn" data-lang="es">ES</button>
  <button class="lang-btn" data-lang="fr">FR</button>
  <button class="lang-btn" data-lang="ru">RU</button>
</div>

<!-- Декоративные кольца -->
<div class="deco-ring deco-ring-1"></div>
<div class="deco-ring deco-ring-2"></div>
<div class="deco-ring deco-ring-3"></div>

<!-- Частицы -->
<div id="particles"></div>

<!-- Основной блок -->
<section class="hero-section">
  <div class="hero-bg-glow"></div>

  <div class="hero-inner">
    <!-- Код ошибки 404 -->
    <div class="error-code reveal reveal-1">
      <span class="digit">4</span>
      <span class="digit">0</span>
      <span class="digit">4</span>
    </div>

    <!-- Заголовок -->
    <h1 class="error-title reveal reveal-2" id="titleLine">
      Ваш регион<br/><em id="titleHighlight">не обслуживается</em>
    </h1>

    <!-- Описание -->
    <p class="error-desc reveal reveal-3" id="descText">
      Согласно политике безопасности и требованиям регулятора, доступ с вашего IP-адреса и геолокации запрещён. Ваш регион не входит в список разрешённых юрисдикций.
    </p>
  </div>
</section>

<script type="module">
  import { auth } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  onAuthStateChanged(auth, user => {
    const np = document.getElementById('navProfile');
    const nl = document.getElementById('navLogin');
    if (user) {
      if (np) np.style.display = 'flex';
      if (nl) nl.style.display = 'none';
    } else {
      if (np) np.style.display = 'none';
      if (nl) nl.style.display = 'flex';
    }
  });
</script>

<script>
  // ── Переводы ──
  const translations = {
    en: {
      titlePrefix: 'Your region',
      titleHighlight: 'is not serviced',
      desc: 'According to security policy and regulatory requirements, access from your IP address and geolocation is prohibited. Your region is not included in the list of permitted jurisdictions.'
    },
    de: {
      titlePrefix: 'Ihre Region',
      titleHighlight: 'wird nicht bedient',
      desc: 'Gemäß der Sicherheitsrichtlinie und regulatorischen Anforderungen ist der Zugriff von Ihrer IP-Adresse und Geolokalisierung untersagt. Ihre Region gehört nicht zu den zugelassenen Gerichtsbarkeiten.'
    },
    es: {
      titlePrefix: 'Tu región',
      titleHighlight: 'no está disponible',
      desc: 'De acuerdo con la política de seguridad y los requisitos reglamentarios, el acceso desde su dirección IP y geolocalización está prohibido. Su región no está incluida en la lista de jurisdicciones permitidas.'
    },
    fr: {
      titlePrefix: 'Votre région',
      titleHighlight: "n'est pas desservie",
      desc: "Conformément à la politique de sécurité et aux exigences réglementaires, l'accès depuis votre adresse IP et votre géolocalisation est interdit. Votre région ne figure pas dans la liste des juridictions autorisées."
    },
    ru: {
      titlePrefix: 'Ваш регион',
      titleHighlight: 'не обслуживается',
      desc: 'Согласно политике безопасности и требованиям регулятора, доступ с вашего IP-адреса и геолокации запрещён. Ваш регион не входит в список разрешённых юрисдикций.'
    }
  };

  function setLanguage(langCode) {
    if (!translations[langCode]) return;
    const t = translations[langCode];
    
    const titleLine = document.getElementById('titleLine');
    const titleHighlight = document.getElementById('titleHighlight');
    const desc = document.getElementById('descText');
    
    if (titleLine && titleHighlight) {
      titleLine.innerHTML = `${t.titlePrefix}<br/><em id="titleHighlight">${t.titleHighlight}</em>`;
    }
    if (desc) desc.textContent = t.desc;
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
      const langAttr = btn.getAttribute('data-lang');
      if (langAttr === langCode) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    
    localStorage.setItem('selectedLang', langCode);
  }

  // ── Загрузка сохранённого языка ──
  let savedLang = localStorage.getItem('selectedLang');
  if (!savedLang || !translations[savedLang]) savedLang = 'en';
  setLanguage(savedLang);

  // ── Клики по кнопкам языка ──
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.getAttribute('data-lang');
      if (lang && translations[lang]) setLanguage(lang);
    });
  });

  // ── Появление элементов ──
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(el => {
      if (el.isIntersecting) el.target.classList.add('visible');
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // ── Частицы ──
  (function() {
    const container = document.getElementById('particles');
    if (!container) return;
    const colors = ['rgba(30,222,123,', 'rgba(30,222,123,', 'rgba(30,222,123,'];
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 5 + 2;
      const color = colors[Math.floor(Math.random() * colors.length)];
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        background: ${color}${Math.random() * 0.3 + 0.1});
        animation-duration: ${Math.random() * 14 + 10}s;
        animation-delay: ${Math.random() * 12}s;
      `;
      container.appendChild(p);
    }
  })();
</script>

<script src="footer.js" data-page="auth"></script>
</body>
</html>
