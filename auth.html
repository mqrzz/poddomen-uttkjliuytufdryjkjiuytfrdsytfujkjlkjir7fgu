<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход — Antviz</title>
  <link rel="icon" href="favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0c;--bg3:#18181f;--card:#16161d;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#a78bfa;--text:#f0f0f5;--muted:#777789;--success:#4ade80;--error:#f87171}
    body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 1.5rem 1.5rem;overflow-x:hidden}
    nav.desktop-nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;width:calc(100% - 40px);max-width:1100px;background:rgba(22,22,30,0.88);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:28px;box-shadow:0 4px 30px rgba(0,0,0,.4)}
    .nav-logo{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.9rem;letter-spacing:.04em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
    .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
    .nav-links-auth{display:flex;gap:1.5rem;align-items:center}
    .nav-links-auth a{color:var(--muted);text-decoration:none;font-size:.8rem;letter-spacing:.02em;transition:color .2s}
    .nav-links-auth a:hover{color:var(--text)}
    .nav-cta-auth{background:var(--accent)!important;color:#fff!important;padding:.4rem 1.1rem;border-radius:50px;font-weight:500!important}
    @media(max-width:1024px){nav.desktop-nav{display:none!important}body{padding-top:1.5rem}}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(108,99,255,.18),transparent 70%);pointer-events:none}
    .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:2.2rem 2.4rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .logo{display:flex;align-items:center;gap:10px;font-family:'Unbounded',sans-serif;font-weight:600;font-size:1rem;text-decoration:none;color:var(--text);margin-bottom:2rem}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 11px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
    h1{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1.55rem;line-height:1.1;margin-bottom:.4rem}
    .sub{color:var(--muted);font-size:.92rem;margin-bottom:2rem}
    .tabs{display:flex;gap:.4rem;background:var(--bg3);border-radius:14px;padding:4px;margin-bottom:1.9rem}
    .tab{flex:1;background:none;border:none;color:var(--muted);font-family:'Onest',sans-serif;font-size:.88rem;font-weight:500;padding:.6rem;border-radius:11px;cursor:pointer;transition:all .18s}
    .tab.active{background:var(--accent);color:#fff}
    .panel{display:none}.panel.active{display:block}
    .fg{margin-bottom:1rem}
    .label{display:block;font-size:.72rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.42rem}
    .inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.8rem 1.05rem;color:var(--text);font-family:'Onest',sans-serif;font-size:.96rem;font-weight:300;outline:none;transition:border-color .2s,box-shadow .2s}
    .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
    .inp.err{border-color:var(--error)!important}
    .errmsg{color:var(--error);font-size:.74rem;margin-top:.25rem;display:none}
    .errmsg.show{display:block}
    .forgot{display:block;text-align:right;font-size:.78rem;color:var(--muted);text-decoration:none;margin-top:-.35rem;margin-bottom:1rem;transition:color .2s}
    .forgot:hover{color:var(--accent2)}
    .btn-main{width:100%;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:.95rem;font-family:'Onest',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:box-shadow .2s,opacity .2s;margin-top:1.1rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .btn-main:hover{box-shadow:0 6px 28px rgba(108,99,255,.45)}
    .btn-main:disabled{opacity:.5;cursor:default;box-shadow:none}
    .divider{display:flex;align-items:center;gap:.7rem;margin:1.5rem 0;color:var(--muted);font-size:.78rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .btn-google{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:50px;padding:.85rem;font-family:'Onest',sans-serif;font-size:.96rem;font-weight:400;cursor:pointer;transition:border-color .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:.7rem}
    .btn-google:hover{border-color:rgba(108,99,255,.4);box-shadow:0 4px 18px rgba(0,0,0,.3)}
    .back{display:block;text-align:center;color:var(--muted);font-size:.84rem;text-decoration:none;margin-top:1.6rem;transition:color .2s}
    .back:hover{color:var(--text)}
    /* FORGOT PASSWORD MODAL */
    .modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem}
    .modal-bg.show{display:flex}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:2.2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .modal h3{font-family:'Unbounded',sans-serif;font-weight:600;font-size:1.05rem;margin-bottom:.45rem}
    .modal p{color:var(--muted);font-size:.88rem;margin-bottom:1.3rem}
    .modal-btns{display:flex;gap:.6rem;margin-top:1.1rem}
    .btn-outline{flex:1;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:50px;padding:.72rem;font-family:'Onest',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s}
    .btn-outline:hover{border-color:var(--accent);color:var(--text)}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);z-index:400;padding:.65rem 1.4rem;border-radius:50px;font-size:.82rem;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--success);color:#000}
    .toast.error{background:var(--error);color:#fff}
    .toast.info{background:var(--accent);color:#fff}
    @media(max-width:500px){
      .card{padding:1.6rem 1.3rem;border-radius:18px}
      h1{font-size:1.25rem}
    }

  </style>
</head>
<body>

<nav class="desktop-nav">
  <a class="nav-logo" href="index.html"><span class="nav-logo-dot"></span>Design Antviz</a>
  <div class="nav-links-auth">
    <a href="index.html">Главная</a>
    <a href="faq.html">FAQ</a>
    <a href="order.html" class="nav-cta-auth">Заказать сайт</a>
  </div>
</nav>

<div class="card">
  <a href="index.html" class="logo"><span class="logo-dot"></span>Design Antviz</a>
  <h1>Добро<br>пожаловать</h1>
  <p class="sub">Войдите или создайте аккаунт</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Войти</button>
    <button class="tab" onclick="switchTab('register')">Регистрация</button>
  </div>

  <!-- LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="fg"><label class="label">Email</label><input class="inp" type="email" id="l-email" placeholder="your@email.com"/><div class="errmsg" id="err-l-email"></div></div>
    <div class="fg"><label class="label">Пароль</label><input class="inp" type="password" id="l-pass" placeholder="••••••••"/><div class="errmsg" id="err-l-pass"></div></div>
    <a href="#" class="forgot" onclick="openForgot(event)">Забыли пароль?</a>
    <button class="btn-main" id="loginBtn" onclick="doLogin()">Войти</button>
    <div class="divider">или</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Войти через Google
    </button>
  </div>

  <!-- REGISTER -->
  <div class="panel" id="panel-register">
    <div class="fg"><label class="label">Ваше имя <span style="color:var(--accent2)">*</span></label><input class="inp" type="text" id="r-name" placeholder="Как вас зовут?"/><div class="errmsg" id="err-r-name">Введите имя</div></div>
    <div class="fg"><label class="label">Email <span style="color:var(--accent2)">*</span></label><input class="inp" type="email" id="r-email" placeholder="your@email.com"/><div class="errmsg" id="err-r-email"></div></div>
    <div class="fg"><label class="label">Пароль <span style="color:var(--accent2)">*</span></label><input class="inp" type="password" id="r-pass" placeholder="Минимум 6 символов"/><div class="errmsg" id="err-r-pass"></div></div>
    <button class="btn-main" id="registerBtn" onclick="doRegister()">Создать аккаунт</button>
    <div class="divider">или</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Регистрация через Google
    </button>
  </div>

  <a href="index.html" class="back">← Вернуться на главную</a>
</div>

<!-- FORGOT PASSWORD MODAL -->
<div class="modal-bg" id="forgotModal">
  <div class="modal">
    <h3>Восстановление пароля</h3>
    <p>Введите email от аккаунта — пришлём ссылку для сброса пароля.</p>
    <div class="fg"><label class="label">Email</label><input class="inp" type="email" id="forgot-email" placeholder="your@email.com"/></div>
    <div class="modal-btns">
      <button class="btn-outline" onclick="closeForgot()">Отмена</button>
      <button class="btn-main" style="flex:1;margin-top:0" onclick="sendReset()">Отправить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import {
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    GoogleAuthProvider, signInWithPopup,
    onAuthStateChanged, updateProfile, sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, setDoc, getDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── MAINTENANCE ──
  let maintOverlay = null;
  onSnapshot(doc(db, 'settings', 'maintenance'), snap => {
    const on = snap.exists() && snap.data().enabled === true;
    if (on && !maintOverlay) {
      maintOverlay = document.createElement('div');
      maintOverlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0a0c;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center;padding:2rem;font-family:Onest,sans-serif;color:#f0f0f5';
      maintOverlay.innerHTML = `
        <div style="font-size:3.5rem">🔧</div>
        <div style="font-family:Unbounded,sans-serif;font-weight:700;font-size:1.4rem">Технические работы</div>
        <div style="color:#777789;font-size:.9rem;max-width:380px;line-height:1.6">Сайт временно недоступен. Мы уже работаем над этим — скоро всё будет готово!</div>`;
      document.body.appendChild(maintOverlay);
      document.body.style.overflow = 'hidden';
    } else if (!on && maintOverlay) {
      maintOverlay.remove(); maintOverlay = null;
      document.body.style.overflow = '';
    }
  });

  onAuthStateChanged(auth, user => {
    if(user) {
      // Return to previous page if came from order.html, otherwise go to profile
      const ref = document.referrer;
      if(ref && ref.includes('order.html')) {
        window.location.href = 'order.html';
      } else {
        window.location.href = 'profile.html';
      }
    }
  });

  function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3200);}
  function setLoading(id,on){const b=document.getElementById(id);b.disabled=on;b.textContent=on?'Подождите...':(id==='loginBtn'?'Войти':'Создать аккаунт');}

  async function saveProfile(user,name){
    const r=doc(db,'users',user.uid);
    const s=await getDoc(r);
    if(!s.exists()) await setDoc(r,{uid:user.uid,name:name||user.displayName||'Пользователь',email:user.email,createdAt:serverTimestamp(),ordersCount:0});
  }

  window.switchTab=function(tab){
    document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
    document.getElementById('panel-login').classList.toggle('active',tab==='login');
    document.getElementById('panel-register').classList.toggle('active',tab==='register');
  };

  window.doLogin=async function(){
    const email=document.getElementById('l-email').value.trim();
    const pass=document.getElementById('l-pass').value;
    let ok=true;
    ['l-email','l-pass'].forEach(id=>{document.getElementById(id).classList.remove('err');document.getElementById('err-'+id).className='errmsg';});
    if(!email){document.getElementById('l-email').classList.add('err');document.getElementById('err-l-email').textContent='Введите email';document.getElementById('err-l-email').className='errmsg show';ok=false;}
    if(!pass){document.getElementById('l-pass').classList.add('err');document.getElementById('err-l-pass').textContent='Введите пароль';document.getElementById('err-l-pass').className='errmsg show';ok=false;}
    if(!ok)return;
    setLoading('loginBtn',true);
    try{await signInWithEmailAndPassword(auth,email,pass);}
    catch(e){
      setLoading('loginBtn',false);
      const msg=e.code==='auth/invalid-credential'?'Неверный email или пароль':e.code==='auth/too-many-requests'?'Слишком много попыток, подождите':'Ошибка: '+e.message;
      toast(msg,'error');
    }
  };

  window.doRegister=async function(){
    const name=document.getElementById('r-name').value.trim();
    const email=document.getElementById('r-email').value.trim();
    const pass=document.getElementById('r-pass').value;
    let ok=true;
    ['r-name','r-email','r-pass'].forEach(id=>{document.getElementById(id).classList.remove('err');document.getElementById('err-'+id).className='errmsg';});
    if(!name){document.getElementById('r-name').classList.add('err');document.getElementById('err-r-name').className='errmsg show';ok=false;}
    if(!email){document.getElementById('r-email').classList.add('err');document.getElementById('err-r-email').textContent='Введите email';document.getElementById('err-r-email').className='errmsg show';ok=false;}
    if(pass.length<6){document.getElementById('r-pass').classList.add('err');document.getElementById('err-r-pass').textContent='Минимум 6 символов';document.getElementById('err-r-pass').className='errmsg show';ok=false;}
    if(!ok)return;
    setLoading('registerBtn',true);
    try{
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      await saveProfile(cred.user,name);
    }catch(e){
      setLoading('registerBtn',false);
      const msg=e.code==='auth/email-already-in-use'?'Этот email уже зарегистрирован':e.code==='auth/invalid-email'?'Некорректный email':'Ошибка: '+e.message;
      toast(msg,'error');
    }
  };

  window.doGoogle=async function(){
    const provider=new GoogleAuthProvider();
    // Используем redirect
    try{
      const cred=await signInWithPopup(auth,provider);
      await saveProfile(cred.user,cred.user.displayName);
    }catch(e){
      if(e.code==='auth/popup-blocked'){
        toast('Попап заблокирован браузером — разрешите всплывающие окна','error');
      } else if(e.code!=='auth/popup-closed-by-user'){
        toast('Ошибка Google входа: '+e.message,'error');
        console.error(e);
      }
    }
  };

  window.openForgot=function(e){e.preventDefault();document.getElementById('forgotModal').classList.add('show');};
  window.closeForgot=function(){document.getElementById('forgotModal').classList.remove('show');};

  window.sendReset=async function(){
    const email=document.getElementById('forgot-email').value.trim();
    if(!email){toast('Введите email','error');return;}
    try{
      await sendPasswordResetEmail(auth,email);
      toast('Письмо отправлено! Проверьте почту.','success');
      closeForgot();
    }catch(e){
      const msg=e.code==='auth/user-not-found'?'Аккаунт с таким email не найден':'Ошибка: '+e.message;
      toast(msg,'error');
    }
  };

  // Закрыть модалку по клику вне
  document.getElementById('forgotModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeForgot();});
</script>

<script src="footer.js" data-page="auth"></script>
</body>
</html>
