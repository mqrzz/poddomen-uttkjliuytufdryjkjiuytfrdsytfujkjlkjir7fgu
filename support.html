<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поддержка — Antviz</title>
  <link rel="icon" href="favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--card:#16161d;
      --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.14);
      --accent:#6c63ff;--accent2:#a78bfa;--accent3:#38bdf8;
      --text:#f0f0f5;--muted:#777789;--muted2:#999aab;
      --success:#4ade80;--error:#f87171;--warn:#fbbf24;
      --nav-h:84px;
      --glass-bg:rgba(18,18,26,0.72);
      --glass-border:rgba(255,255,255,0.11);
      --glass-blur:24px;
      --glass-shadow:0 8px 32px rgba(0,0,0,.45), 0 1.5px 0 rgba(255,255,255,.06) inset;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-weight:300}

    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes botTyping{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.9) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes msgPop{0%{opacity:0;transform:scale(.94) translateY(6px)}60%{transform:scale(1.015) translateY(-1px)}100%{opacity:1;transform:scale(1) translateY(0)}}

    nav.desktop-nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;
      display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;
      width:calc(100% - 40px);max-width:1100px;
      background:rgba(22,22,30,0.82);backdrop-filter:blur(22px);
      border:1px solid rgba(255,255,255,0.09);border-radius:28px;box-shadow:0 4px 30px rgba(0,0,0,.4)}
    .logo{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.9rem;letter-spacing:.04em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
    .nav-links{display:flex;gap:1.5rem;align-items:center}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.8rem;letter-spacing:.02em;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .nav-cta{background:var(--accent)!important;color:#fff!important;padding:.4rem 1.1rem!important;border-radius:50px!important;font-weight:500!important;white-space:nowrap}
    @media(max-width:768px){nav.desktop-nav{display:none!important}}

    .loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.9rem}
    .spinner{width:28px;height:28px;border:2px solid var(--border-hi);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

    .chat-layout{
      position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;
      display:flex;flex-direction:column;
      max-width:720px;margin:0 auto;
      border-left:1px solid var(--border);border-right:1px solid var(--border);
    }
    @media(max-width:768px){.chat-layout{top:0;border:none;bottom:0}}

    /* Chat header — как в мессенджере: без линии сверху, скруглённый */
    .chat-hdr{
      padding:.7rem 1.1rem;
      display:flex;align-items:center;gap:.7rem;
      flex-shrink:0;
    }
    /* Кнопка назад — круглая */
    .back-link{
      width:36px;height:36px;border-radius:50%;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      display:flex;align-items:center;justify-content:center;
      color:var(--muted);text-decoration:none;flex-shrink:0;
      transition:background .15s,border-color .15s,color .15s;
    }
    .back-link:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:var(--text)}
    .back-link svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2}

    /* Основная плашка хедера — скруглённая, без свечения */
    .chat-hdr-body{
      display:flex;align-items:center;gap:.75rem;flex:1;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:.55rem .9rem;
      cursor:default;
    }
    .chat-av{
      width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;
      background:linear-gradient(135deg,rgba(108,99,255,.3),rgba(167,139,250,.2));
      border:2px solid rgba(108,99,255,.2);
      display:flex;align-items:center;justify-content:center;
    }
    .chat-av img{width:100%;height:100%;object-fit:contain;padding:5px}
    .chat-hdr-info{flex:1;min-width:0}
    .chat-hdr-name{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-hdr-sub{font-size:.66rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;margin-top:.08rem}
    .online-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;flex-shrink:0}

    .chat-msgs{
      flex:1;overflow-y:auto;
      padding:1.2rem 1.1rem 1.5rem;
      display:flex;flex-direction:column;gap:.55rem;
      scroll-behavior:smooth;
    }
    .chat-msgs::-webkit-scrollbar{width:3px}
    .chat-msgs::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

    .msg{max-width:80%;display:flex;flex-direction:column;gap:.22rem;animation:msgPop .28s cubic-bezier(.34,1.56,.64,1) both}
    .msg.mine{align-self:flex-end;align-items:flex-end}
    .msg.theirs{align-self:flex-start;align-items:flex-start}

    .msg-bubble{padding:.62rem 1.05rem;border-radius:20px;font-size:.84rem;line-height:1.58;word-break:break-word}
    .msg.mine .msg-bubble{
      background:linear-gradient(140deg,var(--accent) 0%,#8b5cf6 100%);
      color:#fff;border-bottom-right-radius:5px;
      box-shadow:0 2px 14px rgba(108,99,255,.28)}
    .msg.theirs .msg-bubble{
      background:rgba(30,30,42,0.9);border:1px solid var(--border-hi);color:var(--text);
      border-bottom-left-radius:5px;backdrop-filter:blur(8px)}
    .msg-time{font-size:.59rem;color:var(--muted);padding:0 .18rem}

    .typing-indicator{align-self:flex-start;display:flex;align-items:center;gap:5px;padding:.6rem .95rem;
      background:rgba(30,30,42,0.9);border:1px solid var(--border-hi);
      border-radius:20px;border-bottom-left-radius:5px;animation:fadeUp .2s ease;backdrop-filter:blur(8px)}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:botTyping 1.2s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}

    .bot-actions{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;animation:scaleIn .24s cubic-bezier(.34,1.46,.64,1) both}
    .bot-btn{
      background:rgba(255,255,255,.04);border:1px solid var(--glass-border);
      color:var(--text);font-family:'Onest',sans-serif;font-size:.77rem;font-weight:400;
      padding:.4rem .95rem;border-radius:50px;cursor:pointer;
      transition:background .15s,border-color .15s,color .15s,transform .1s;
      white-space:nowrap;letter-spacing:.01em;backdrop-filter:blur(8px);
    }
    .bot-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
    .bot-btn:active{transform:translateY(0)}
    .bot-btn.accent{border-color:rgba(108,99,255,.4);color:var(--accent2);background:rgba(108,99,255,.07)}
    .bot-btn.accent:hover{background:rgba(108,99,255,.14);border-color:rgba(108,99,255,.6)}
    .bot-btn.back{border-color:var(--border);color:var(--muted);font-size:.73rem}
    .bot-btn.back:hover{color:var(--text);border-color:var(--border-hi)}

    .chat-input-wrap{position:relative;flex-shrink:0;padding:.5rem 1rem .85rem;}
    .chat-input-bar{
      display:flex;align-items:center;gap:.3rem;
      background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));
      -webkit-backdrop-filter:blur(var(--glass-blur));
      border:1px solid var(--glass-border);border-radius:999px;
      padding:.36rem .36rem .36rem .72rem;box-shadow:var(--glass-shadow);
      transition:box-shadow .22s,border-color .22s;
    }
    .chat-input-bar:focus-within{
      border-color:rgba(108,99,255,.4);
      box-shadow:0 10px 40px rgba(0,0,0,.55),0 0 0 3px rgba(108,99,255,.1),0 1px 0 rgba(255,255,255,.08) inset;
    }
    .attach-btn{
      width:28px;height:28px;border-radius:50%;background:none;border:none;
      color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:color .15s,transform .12s;padding:0;
    }
    .attach-btn:hover{color:var(--text);transform:scale(1.12)}
    .attach-btn:active{transform:scale(.9)}
    .attach-btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2}
    .chat-textarea{
      flex:1;background:transparent;border:none;color:var(--text);
      font-family:'Onest',sans-serif;font-size:.85rem;font-weight:300;
      outline:none;resize:none;max-height:110px;line-height:1.5;padding:.22rem 0;caret-color:var(--accent2);
    }
    .chat-textarea::placeholder{color:var(--muted)}
    .send-btn{
      width:32px;height:32px;border-radius:50%;
      background:linear-gradient(140deg,var(--accent),#8b5cf6);
      border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;box-shadow:0 2px 10px rgba(108,99,255,.38);
      transition:box-shadow .18s,transform .12s,opacity .18s;opacity:.45;
    }
    .send-btn.active{opacity:1}
    .send-btn.active:hover{box-shadow:0 4px 16px rgba(108,99,255,.55);transform:scale(1.08)}
    .send-btn:active{transform:scale(.9)}
    .send-btn svg{width:14px;height:14px;transform:translateX(1px)}

    .msg-img{max-width:200px;max-height:180px;border-radius:12px;display:block;cursor:pointer;transition:opacity .18s;border:1px solid var(--border)}
    .msg-img:hover{opacity:.82}
    .msg-file-link{display:flex;align-items:center;gap:.38rem;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:9px;padding:.38rem .65rem;font-size:.76rem;text-decoration:none;color:var(--text)}

    .order-info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1.05rem;font-size:.8rem;margin-top:.2rem;min-width:220px}
    .order-info-card .oi-num{font-family:'Unbounded',sans-serif;font-weight:700;font-size:.72rem;margin-bottom:.55rem;color:var(--accent2)}
    .order-info-card .oi-row{display:flex;justify-content:space-between;gap:.5rem;padding:.28rem 0;border-bottom:1px solid var(--border)}
    .order-info-card .oi-row:last-child{border-bottom:none}
    .order-info-card .oi-lbl{color:var(--muted)}
    .order-info-card .oi-val{font-weight:500;text-align:right}
    .s-pill{display:inline-block;padding:.08rem .5rem;border-radius:50px;font-size:.65rem;font-weight:600}
    .s0{background:rgba(102,102,120,.12);color:var(--muted2)}
    .s1{background:rgba(251,191,36,.1);color:var(--warn)}
    .s2{background:rgba(56,189,248,.1);color:var(--accent3)}
    .s3{background:rgba(167,139,250,.1);color:var(--accent2)}
    .s4{background:rgba(251,191,36,.1);color:var(--warn)}
    .s5{background:rgba(74,222,128,.1);color:var(--success)}

    .lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(12px)}
    .lightbox.show{opacity:1;pointer-events:all}
    .lightbox img{max-width:90vw;max-height:88vh;border-radius:12px;object-fit:contain}
    .lb-close{position:fixed;top:1rem;right:1.2rem;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.1rem;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}

    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(14px);z-index:700;
      padding:.5rem 1.2rem;border-radius:50px;font-size:.76rem;font-weight:500;
      opacity:0;transition:opacity .26s,transform .26s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:var(--success)}
    .toast.error{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:var(--error)}
    .toast.info{background:rgba(108,99,255,.18);border:1px solid rgba(108,99,255,.35);color:var(--accent2)}

  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:.76rem;margin-top:.3rem">Загружаю чат...</p>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<nav class="desktop-nav">
  <a class="logo" href="index.html"><span class="logo-dot"></span>Design Antviz</a>
  <div class="nav-links">
    <a href="index.html">Главная</a>
    <a href="faq.html">FAQ</a>
    <a href="profile.html">Кабинет</a>
    <a href="order.html" class="nav-cta">Заказать сайт</a>
  </div>
</nav>

<div class="chat-layout" id="appWrap" style="display:none">
  <!-- Хедер как в мессенджере: кнопка назад + скруглённая плашка с инфой -->
  <div class="chat-hdr">
    <a href="profile.html" class="back-link" title="Назад">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="chat-hdr-body">
      <div class="chat-av"><img src="favicon.png" alt="Support"/></div>
      <div class="chat-hdr-info">
        <div class="chat-hdr-name">Design Antviz</div>
        <div class="chat-hdr-sub"><span class="online-dot"></span>Поддержка · онлайн</div>
      </div>
    </div>
  </div>

  <div class="chat-msgs" id="chatMsgs"></div>

  <div class="chat-input-wrap">
    <input type="file" id="fileInput" style="display:none" multiple
      accept="image/*,.pdf,.doc,.docx,.zip,.rar,.psd,.fig"
      onchange="sendFiles(this.files)"/>
    <div class="chat-input-bar">
      <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <textarea class="chat-textarea" id="chatInput" placeholder="Сообщение..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="onInput(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, query, orderBy, where, onSnapshot, limit,
  addDoc, serverTimestamp, doc, setDoc, updateDoc,
  getDocs, deleteDoc, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const STATUS_LABELS = ['Новая заявка','Обсуждение','В работе','На проверке','Правки','Готово'];
const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

let currentUser = null;
let unsubChat = null;
let userOrders = [];
let flowState = 'topic';
let initialLoadDone = false;
let welcomeShown = false;   // ← флаг: показано ли приветствие в этой сессии
let hasUserMessages = false; // ← были ли уже сообщения от пользователя в чате

/* ── helpers ── */
function toast(msg, type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',3000);
}
function fmtTime(ts){
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  if(!ts) return '—';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function scrollBottom(instant){
  const c=document.getElementById('chatMsgs');
  if(instant) c.style.scrollBehavior='auto';
  c.scrollTop=c.scrollHeight;
  if(instant) setTimeout(()=>c.style.scrollBehavior='smooth',50);
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

window.onInput=function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('sendBtn').classList.toggle('active',el.value.trim().length>0);
};

/* ── purge messages older than 3 days ── */
async function purgeOldMessages(uid){
  try{
    const cutoff=Timestamp.fromMillis(Date.now()-THREE_DAYS_MS);
    const snap=await getDocs(query(collection(db,'chats',uid,'messages'),where('createdAt','<',cutoff)));
    for(const d of snap.docs) deleteDoc(d.ref).catch(()=>{});
  }catch(e){}
}

/* ── Удаление приветствия бота ── */
async function removeWelcomeMessages(){
  if(!currentUser) return;
  try{
    const snap = await getDocs(query(
      collection(db,'chats',currentUser.uid,'messages'),
      where('flowTag','==','welcome')
    ));
    for(const d of snap.docs) deleteDoc(d.ref).catch(()=>{});
    welcomeShown = false;
  }catch(e){}
}

/* ── save bot message to Firestore ── */
async function saveBotMsg(text, flowTag){
  if(!currentUser) return null;
  try{
    const ref = await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'bot', senderName:'Бот', type:'text',
      flowTag: flowTag||null,
      createdAt: serverTimestamp()
    });
    return ref.id;
  }catch(e){ return null; }
}

/* ── render helpers ── */
function renderMsg(m){
  const container=document.getElementById('chatMsgs');
  const isMe=m.sender==='user';
  const isBot=m.sender==='bot';
  const div=document.createElement('div');
  div.className=`msg ${isMe?'mine':'theirs'}`;
  if(m._id) div.dataset.id=m._id;

  if(m.type==='file'){
    const src=m.fileData||m.fileUrl||'';
    const isImg=m.fileType&&m.fileType.startsWith('image/');
    if(isImg) div.innerHTML=`<img class="msg-img" src="${src}" onclick="openLightbox('${src.replace(/'/g,"\\'")}')"/><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
    else div.innerHTML=`<a class="msg-file-link" href="${src}" download="${m.fileName}">📎 ${m.fileName||'Файл'}</a><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
  } else {
    const name = isMe?'Вы': isBot?'Бот':'Поддержка';
    div.innerHTML=`<div class="msg-bubble">${(m.text||'').replace(/\n/g,'<br>')}</div><div class="msg-time">${name} · ${fmtTime(m.createdAt)}</div>`;
  }
  container.appendChild(div);
  return div;
}

function renderBotWithButtons(m){
  const div = renderMsg(m);
  if(!div) return;
  const row = document.createElement('div');
  row.className='bot-actions';
  const buttons = getBotButtons(m.flowTag);
  buttons.forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn${a.cls?' '+a.cls:''}`;
    btn.textContent=a.label;
    btn.onclick=a.fn;
    row.appendChild(btn);
  });
  if(buttons.length) div.appendChild(row);
}

/* ── button sets by flowTag ── */
function getBotButtons(tag){
  const go=(topic)=>()=>{ doSendUserMsg(topic); handleTopic(topic==='order'?'order':topic==='payment'?'payment':topic==='timing'?'timing':'revision'); };
  const topicBtns=[
    {label:'Статус заказа', cls:'accent', fn:()=>{ doSendUserMsg('Статус заказа'); handleTopic('order'); }},
    {label:'Оплата',        cls:'accent', fn:()=>{ doSendUserMsg('Оплата'); handleTopic('payment'); }},
    {label:'Сроки',         cls:'accent', fn:()=>{ doSendUserMsg('Сроки'); handleTopic('timing'); }},
    {label:'Правки',        cls:'accent', fn:()=>{ doSendUserMsg('Правки'); handleTopic('revision'); }},
    {label:'Написать вопрос', fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }},
  ];
  const backBtn={label:'Назад к темам', cls:'back', fn:()=>showTopicMenu()};
  const managerBtn={label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()};

  switch(tag){
    case 'welcome': return topicBtns;
    case 'topic':   return topicBtns;
    case 'no_orders': return [
      {label:'Оформить заказ', cls:'accent', fn:()=>window.location.href='order.html'},
      {label:'Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'pick_order': return [
      ...userOrders.map(o=>({
        label:`№ ${(o.id||'').slice(0,8).toUpperCase()} · ${STATUS_LABELS[o.status||0]}`,
        cls:'accent',
        fn:async()=>{ showTyping(); await delay(700); hideTyping(); appendOrderCard(o); }
      })),
      {label:'Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'payment':  return [backBtn, managerBtn];
    case 'timing':   return [backBtn, managerBtn];
    case 'revision': return [backBtn, {label:'Описать правки', cls:'accent', fn:()=>openFreeChat()}];
    case 'free':     return [backBtn];
    case 'hint':     return [{label:'Написать вопрос', cls:'accent', fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }}];
    default: return [];
  }
}

function appendOrderCard(o){
  const container=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='msg theirs';
  const s=o.status||0;
  div.innerHTML=`
    <div class="msg-bubble">Вот информация по вашему заказу:</div>
    <div class="order-info-card">
      <div class="oi-num">№ ${(o.id||'').slice(0,8).toUpperCase()}</div>
      <div class="oi-row"><span class="oi-lbl">Тип</span><span class="oi-val">${o.siteType||'Сайт'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Статус</span><span class="oi-val"><span class="s-pill s${s}">${STATUS_LABELS[s]}</span></span></div>
      <div class="oi-row"><span class="oi-lbl">Оплата</span><span class="oi-val" style="color:${o.paid?'var(--success)':'var(--error)'}">${o.paid?'Оплачен':'Не оплачен'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Сумма</span><span class="oi-val">${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Создан</span><span class="oi-val">${fmtDate(o.createdAt)}</span></div>
      ${o.statusComment?`<div class="oi-row" style="flex-direction:column;gap:.2rem"><span class="oi-lbl">Комментарий</span><span class="oi-val" style="text-align:left;color:var(--accent2)">${o.statusComment}</span></div>`:''}
    </div>
    <div class="msg-time">Бот · сейчас</div>`;
  const row=document.createElement('div');
  row.className='bot-actions';
  [{label:'Назад к темам', cls:'back', fn:()=>showTopicMenu()},
   {label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()}
  ].forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn ${a.cls}`; btn.textContent=a.label; btn.onclick=a.fn;
    row.appendChild(btn);
  });
  div.appendChild(row);
  container.appendChild(div);
  scrollBottom();
}

function showTyping(){
  const c=document.getElementById('chatMsgs');
  const el=document.createElement('div');
  el.className='typing-indicator'; el.id='typingIndicator';
  el.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  c.appendChild(el); scrollBottom();
}
function hideTyping(){document.getElementById('typingIndicator')?.remove();}

/* ── persist user msg (from button clicks) ── */
async function doSendUserMsg(text){
  if(!currentUser||!text) return;
  try{
    // Если пользователь что-то отправил (даже кнопкой) — удаляем приветствие
    if(welcomeShown) await removeWelcomeMessages();

    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){}
}

/* ── BOT FLOW ── */
async function showWelcome(){
  // Удаляем старые приветствия перед показом нового
  await removeWelcomeMessages();
  welcomeShown = true;
  await saveBotMsg('Привет! Я бот Антвизик.\nЧем могу помочь? Выберите тему:', 'welcome');
}

async function showTopicMenu(){
  flowState='topic';
  await saveBotMsg('Выберите тему:', 'topic');
}

async function handleTopic(topic){
  if(topic==='order'){
    if(!userOrders.length){
      showTyping(); await delay(800); hideTyping();
      await saveBotMsg('У вас пока нет заказов. Хотите оформить первый?', 'no_orders');
      return;
    }
    if(userOrders.length===1){
      showTyping(); await delay(900); hideTyping();
      appendOrderCard(userOrders[0]);
      return;
    }
    showTyping(); await delay(600); hideTyping();
    await saveBotMsg('Выберите заказ:', 'pick_order');
    return;
  }
  showTyping(); await delay(900); hideTyping();
  const texts={
    payment:'Принимаем оплату через СБП, банковские карты, T‑Pay и SberPay.\nПосле подтверждения заказа менеджер пришлёт реквизиты.',
    timing:'Сроки зависят от объёма:\n· Большинство сайтов — около двух дней\n· Если срок меняется, появится уведомление\n· Точные сроки уточняем после первого этапа заказа',
    revision:'Правки вносим по вашему ТЗ. Укажите в сообщении, что именно хотите изменить — менеджер ответит в ближайшее время.',
  };
  await saveBotMsg(texts[topic], topic);
}

async function openFreeChat(){
  flowState='open';
  await saveBotMsg('Напишите ваш вопрос — менеджер ответит в ближайшее время.\nДля быстрой навигации используйте кнопки выше.', 'free');
  document.getElementById('chatInput').focus();
}

/* ── Firestore live listener ── */
function listenChat(uid){
  if(unsubChat) unsubChat();
  const q=query(collection(db,'chats',uid,'messages'),orderBy('createdAt','asc'),limit(100));
  unsubChat=onSnapshot(q,snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'){
        const m={...ch.doc.data(), _id:ch.doc.id};
        if(document.querySelector(`[data-id="${m._id}"]`)) return;

        if(m.sender==='bot'){
          renderBotWithButtons(m);
          if(m.flowTag==='welcome') welcomeShown = true;
        } else if(m.sender==='admin'||m.sender==='user'){
          renderMsg(m);
          if(m.sender==='user') hasUserMessages = true;
        }
        if(m.sender==='admin'&&!m.readByUser)
          updateDoc(ch.doc.ref,{readByUser:true}).catch(()=>{});

        scrollBottom(!initialLoadDone);
      }
    });

    if(!initialLoadDone){
      initialLoadDone=true;
      setTimeout(()=>scrollBottom(true), 80);
    }
  },e=>console.error(e));
}

/* ── Send message from textarea ── */
window.sendMsg=async function(){
  if(!currentUser) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('sendBtn').classList.remove('active');

  // При любой ручной отправке — удаляем приветствие
  if(welcomeShown) await removeWelcomeMessages();

  if(flowState==='topic'){
    await saveBotMsg('Для навигации используйте кнопки выше.\nЕсли хотите написать менеджеру — нажмите «Написать вопрос».', 'hint');
    return;
  }

  flowState='open';
  try{
    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){ toast('Ошибка отправки','error'); }
};

/* ── File sending ── */
window.sendFiles=async function(files){
  if(!currentUser||!files.length) return;
  for(const file of Array.from(files)){
    if(file.size>3*1024*1024){ toast(file.name+' > 3 МБ','error'); continue; }
    try{
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file);
      });
      await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
        type:'file', fileData:base64, fileName:file.name, fileType:file.type,
        sender:'user', senderName:currentUser.displayName||'', createdAt:serverTimestamp()
      });
      toast(file.name+' ✓','success');
    }catch(e){ toast('Ошибка: '+file.name,'error'); }
  }
  document.getElementById('fileInput').value='';
};

/* ── Lightbox ── */
window.openLightbox=function(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
};
window.closeLightbox=function(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src='';
};
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeLightbox();});

/* ── Bootstrap ── */
onAuthStateChanged(auth,async user=>{
  if(!user){ window.location.href='auth.html'; return; }
  currentUser=user;

  await purgeOldMessages(user.uid);

  try{
    // No orderBy to avoid composite index requirement
    const snap=await getDocs(
      query(collection(db,'orders'),where('uid','==',user.uid))
    );
    userOrders=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }catch(e){}

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appWrap').style.display='flex';

  // Проверяем, есть ли вообще сообщения в чате
  const chatSnap = await getDocs(collection(db,'chats',user.uid,'messages'));
  
  // Проверяем, есть ли сообщения от пользователя
  hasUserMessages = false;
  chatSnap.forEach(doc => {
    if(doc.data().sender === 'user') hasUserMessages = true;
  });

  // Запускаем слушатель
  listenChat(user.uid);

  // Если чат пустой или нет сообщений от пользователя — показываем приветствие
  if(chatSnap.empty || !hasUserMessages) {
    await showWelcome();
  }
  // Если есть сообщения от пользователя — не показываем, ждём следующего захода
});
</script>
